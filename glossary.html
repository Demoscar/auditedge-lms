<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Glossary — AuditEdge Skillternship</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script><script src="js/app.js"></script>
<link rel="manifest" href="manifest.json"><meta name="theme-color" content="#0A1628"></head>
<body>
<div class="bg-mesh"></div>
<div id="appShell" class="app-shell" style="opacity:0;transition:opacity 0.3s">
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="topbarContainer"></div>
    <div class="page-body" id="pageBody"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</div>
<div class="notif-panel" id="notifPanel">
  <div class="notif-panel-head"><span class="notif-panel-title">Notifications</span><button onclick="toggleNotifs()" style="background:none;border:none;color:var(--muted);cursor:pointer">✕</button></div>
  <div class="notif-list" id="notifList"></div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script>
let allTerms = [], activeFilter = 'All', searchQuery = '';

async function init() {
  const ctx = await buildShell('glossary','Glossary');
  if (!ctx) return;
  const { data } = await sb.from('glossary').select('*').order('term');
  allTerms = data || [];
  renderPage();
}

function renderPage() {
  const cats = ['All', ...new Set(allTerms.map(t=>t.category))].sort((a,b)=>a==='All'?-1:a.localeCompare(b));
  let filtered = allTerms;
  if (activeFilter !== 'All') filtered = filtered.filter(t=>t.category===activeFilter);
  if (searchQuery) filtered = filtered.filter(t=>
    t.term.toLowerCase().includes(searchQuery) || t.definition.toLowerCase().includes(searchQuery)
  );

  document.getElementById('pageBody').innerHTML = `
    <div style="margin-bottom:1.5rem">
      <h1 class="font-head" style="font-size:1.5rem;font-weight:800;margin-bottom:4px">IT Audit Glossary</h1>
      <p class="text-muted text-sm">${allTerms.length} terms · Essential vocabulary for the IT Audit Skillternship</p>
    </div>
    <div style="display:flex;gap:1rem;margin-bottom:1.2rem;flex-wrap:wrap">
      <div class="search-wrap" style="flex:1;min-width:200px">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="form-input" placeholder="Search terms..." oninput="searchTerms(this.value)" value="${searchQuery}">
      </div>
    </div>
    <div class="artifacts-filters">
      ${cats.map(c=>`<button class="filter-chip ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('')}
    </div>
    ${!filtered.length ? `<div class="empty-state"><span class="empty-state-icon">🔍</span><div class="empty-state-desc">No terms match your search</div></div>` :
    `<div class="glossary-grid">
      ${filtered.map((t,i) => `
      <div class="glossary-card" style="animation:fadeIn 0.3s ${Math.min(i,12)*0.04}s both">
        <div class="glossary-term">${t.term}</div>
        <div class="glossary-def">${t.definition}</div>
        <span class="glossary-cat ${glossCatClass(t.category)}">${t.category}</span>
        ${t.related_week ? `<span style="margin-left:6px;font-size:0.65rem;color:var(--muted);font-family:var(--font-mono)">Week ${t.related_week}</span>` : ''}
      </div>`).join('')}
    </div>`}
  `;
}

function setFilter(f) { activeFilter = f; renderPage(); }
function searchTerms(q) { searchQuery = q.toLowerCase(); renderPage(); }

init();
</script>
</body>
</html>
