<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Profile — AuditEdge Skillternship</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script><script src="js/app.js"></script>
<link rel="manifest" href="manifest.json"><meta name="theme-color" content="#0A1628"></head>
<body>
<div class="bg-mesh"></div>
<div id="appShell" class="app-shell" style="opacity:0;transition:opacity 0.3s">
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="topbarContainer"></div>
    <div class="page-body" id="pageBody"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</div>
<div class="notif-panel" id="notifPanel">
  <div class="notif-panel-head"><span class="notif-panel-title">Notifications</span><button onclick="toggleNotifs()" style="background:none;border:none;color:var(--muted);cursor:pointer">✕</button></div>
  <div class="notif-list" id="notifList"></div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script>
const COLORS = [
  ['7B2D8B','E8D5FF','Purple'],['1F4E79','D6EAF8','Navy'],
  ['0D6E8C','CCF5F0','Teal'],['B8860B','FEF9E7','Gold'],
  ['1A6B3A','E9F7EF','Green'],['AE2012','FFE5E3','Red'],
  ['4361EE','E8EDFF','Blue'],['560BAD','EDE3FF','Violet']
];
let selectedColor = 0;

async function init() {
  const ctx = await buildShell('profile','My Profile');
  if (!ctx) return;
  const { profile, user } = ctx;
  const progress = await getProgress(user.id);
  const subs = await getSubmissions(user.id);
  renderProfile(profile, progress, subs);
}

function renderProfile(profile, progress, subs) {
  const overall = calcOverallProgress(progress);
  const avg     = calcAvgScore(progress);
  const initial = profile.full_name.charAt(0).toUpperCase();

  document.getElementById('pageBody').innerHTML = `
    <div style="margin-bottom:1.5rem">
      <h1 class="font-head" style="font-size:1.5rem;font-weight:800;margin-bottom:4px">My Profile</h1>
      <p class="text-muted text-sm">Manage your account settings</p>
    </div>
    <div class="grid-2" style="gap:1.5rem;align-items:start">

      <!-- Left: identity card -->
      <div>
        <div class="card" style="text-align:center;padding:2rem;margin-bottom:1rem">
          <div id="bigAvatar" style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#7B2D8B,#4361EE);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:800;font-size:1.8rem;margin:0 auto 1rem">${initial}</div>
          <div class="font-head font-bold" style="font-size:1.1rem;margin-bottom:4px">${profile.full_name}</div>
          <div class="text-muted text-sm">${profile.email}</div>
          <div style="display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:4px 12px;border-radius:50px;background:rgba(0,201,167,0.1);color:var(--teal);font-size:0.75rem;font-weight:700">Cohort ${profile.cohort||'2024'}</div>
        </div>

        <!-- Stats card -->
        <div class="card">
          <div class="card-title">My Stats</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:0.75rem">
            <div style="text-align:center"><div class="stat-value" style="font-size:1.6rem">${overall}%</div><div class="stat-label">Progress</div></div>
            <div style="text-align:center"><div class="stat-value" style="font-size:1.6rem;color:var(--teal)">${avg!==null?avg+'%':'—'}</div><div class="stat-label">Avg Score</div></div>
            <div style="text-align:center"><div class="stat-value" style="font-size:1.6rem">${progress.filter(p=>p.status==='completed').length}</div><div class="stat-label">Weeks Done</div></div>
            <div style="text-align:center"><div class="stat-value" style="font-size:1.6rem">${subs.length}</div><div class="stat-label">Submissions</div></div>
          </div>
          <div class="progress-bar-wrap" style="margin-top:1rem"><div class="progress-bar-fill" style="width:${overall}%"></div></div>
        </div>
      </div>

      <!-- Right: edit forms -->
      <div>
        <div class="card" style="margin-bottom:1rem">
          <div class="card-title" style="margin-bottom:1rem">Edit Profile</div>
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" id="editName" value="${profile.full_name}">
          </div>
          <div class="form-group">
            <label class="form-label">Avatar Colour</label>
            <div class="avatar-picker">
              ${COLORS.map((c,i)=>`
              <div class="avatar-swatch ${i===0?'selected':''}" id="swatch_${i}"
                style="background:linear-gradient(135deg,#${c[0]},#${c[1]})"
                onclick="selectColor(${i})" title="${c[2]}"></div>`).join('')}
            </div>
          </div>
          <button class="btn btn-primary" onclick="saveProfile()" style="margin-top:0.5rem">Save Changes</button>
        </div>

        <div class="card" style="margin-bottom:1rem">
          <div class="card-title" style="margin-bottom:1rem">Change Password</div>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" class="form-input" id="newPw" placeholder="At least 8 characters" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <input type="password" class="form-input" id="newPw2" placeholder="Repeat new password" autocomplete="new-password">
          </div>
          <button class="btn btn-ghost" onclick="changePassword()">Update Password</button>
        </div>

        <div class="card" style="border-color:rgba(229,83,75,0.2);background:rgba(229,83,75,0.04)">
          <div class="card-title" style="color:var(--red);margin-bottom:0.5rem">Danger Zone</div>
          <p class="text-muted text-sm" style="margin-bottom:1rem">Sign out of all devices or contact your instructor to remove your account.</p>
          <button class="btn btn-ghost" style="color:var(--red);border-color:rgba(229,83,75,0.3)" onclick="signOut()">Sign Out</button>
        </div>
      </div>
    </div>
  `;
}

function selectColor(i) {
  document.querySelectorAll('.avatar-swatch').forEach((el,j) => el.classList.toggle('selected',j===i));
  selectedColor = i;
  const c = COLORS[i];
  document.getElementById('bigAvatar').style.background = `linear-gradient(135deg,#${c[0]},#${c[1]})`;
}

async function saveProfile() {
  const name = document.getElementById('editName').value.trim();
  if (!name) { toast('Name cannot be empty','error'); return; }
  try {
    const user = await getUser();
    await sb.from('profiles').update({ full_name: name }).eq('id', user.id);
    await sb.auth.updateUser({ data: { full_name: name } });
    toast('Profile updated!','success');
  } catch(e) { toast(e.message,'error'); }
}

async function changePassword() {
  const pw  = document.getElementById('newPw').value;
  const pw2 = document.getElementById('newPw2').value;
  if (pw.length < 8)  { toast('Password must be at least 8 characters','error'); return; }
  if (pw !== pw2)     { toast('Passwords do not match','error'); return; }
  try {
    const { error } = await sb.auth.updateUser({ password: pw });
    if (error) throw error;
    toast('Password updated!','success');
    document.getElementById('newPw').value = '';
    document.getElementById('newPw2').value = '';
  } catch(e) { toast(e.message,'error'); }
}

init();
</script>
</body>
</html>
