<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artifact Library — AuditEdge Skillternship</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script><script src="js/app.js"></script>
<link rel="manifest" href="manifest.json"><meta name="theme-color" content="#0A1628"></head>
<body>
<div class="bg-mesh"></div>
<div id="appShell" class="app-shell" style="opacity:0;transition:opacity 0.3s">
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="topbarContainer"></div>
    <div class="page-body" id="pageBody"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</div>
<div class="notif-panel" id="notifPanel">
  <div class="notif-panel-head"><span class="notif-panel-title">Notifications</span><button onclick="toggleNotifs()" style="background:none;border:none;color:var(--muted);cursor:pointer">✕</button></div>
  <div class="notif-list" id="notifList"></div>
</div>
<!-- Artifact Detail Modal -->
<div class="modal-overlay" id="artifactModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="font-mono text-teal text-xs" id="modalCode"></div>
        <div class="modal-title" id="modalArtTitle"></div>
      </div>
      <button class="modal-close" onclick="closeArtModal()">✕</button>
    </div>
    <div class="text-muted text-sm" id="modalArtDesc" style="margin-bottom:1.5rem;line-height:1.6"></div>
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap">
      <a id="modalDownloadBtn" href="#" target="_blank" class="btn btn-primary" style="width:auto;margin:0">
        ${Icons?.download||'↓'} Open / Download
      </a>
      <button onclick="closeArtModal()" class="btn btn-ghost">Close</button>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script>
let allArtifacts = [], activeFilter = 'All', searchQuery = '';

async function init() {
  const auth = await requireAuth(); if (!auth) return;
  const { profile, user } = auth;
  const progress = await getProgress(user.id);
  const maxWeek = Math.max(...progress.filter(p=>p.status!=='locked').map(p=>p.week_number), 1);

  // Instructors see all; mentees see unlocked
  const isInstructor = profile.role === 'instructor';
  allArtifacts = isInstructor ? await getArtifacts() : await getArtifacts(maxWeek);

  const notifs = await getNotifications(user.id);
  const unread = notifs.filter(n=>!n.read).length;
  document.getElementById('sidebarContainer').innerHTML = renderSidebar('artifacts', profile);
  document.getElementById('topbarContainer').innerHTML = renderTopbar('Artifact Library', profile, unread);
  renderArtifacts();
  document.getElementById('appShell').style.opacity = '1';
}

function renderArtifacts() {
  const categories = ['All', ...new Set(allArtifacts.map(a=>a.category))];
  let filtered = allArtifacts;
  if (activeFilter !== 'All') filtered = filtered.filter(a=>a.category===activeFilter);
  if (searchQuery) filtered = filtered.filter(a=>
    a.title.toLowerCase().includes(searchQuery) ||
    a.code.toLowerCase().includes(searchQuery) ||
    (a.description||'').toLowerCase().includes(searchQuery)
  );

  document.getElementById('pageBody').innerHTML = `
    <div style="margin-bottom:1.5rem">
      <h1 class="font-head" style="font-size:1.5rem;font-weight:800;margin-bottom:4px">Artifact Library</h1>
      <p class="text-muted text-sm">${allArtifacts.length} files available · Policies, Templates, Reference Documents, Simulation Data</p>
    </div>
    <div style="display:flex;gap:1rem;margin-bottom:1.2rem;flex-wrap:wrap;align-items:center">
      <div style="position:relative;flex:1;min-width:200px">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)">${Icons.search}</span>
        <input type="text" class="form-input" placeholder="Search artifacts..." style="padding-left:2.5rem" oninput="searchArtifacts(this.value)" value="${searchQuery}">
      </div>
    </div>
    <div class="artifacts-filters">
      ${categories.map(c=>`<button class="filter-chip ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('')}
    </div>
    ${filtered.length === 0 ? `<div style="text-align:center;padding:3rem;color:var(--muted)">No artifacts found</div>` : `
    <div class="artifacts-grid">
      ${filtered.map(a => `
      <div class="artifact-card" onclick="openArtifact(${JSON.stringify(a).replace(/"/g,'&quot;')})">
        <div class="artifact-header">
          <div class="artifact-icon" style="background:rgba(255,255,255,0.06);">${fileTypeIcon(a.file_type)}</div>
          <div>
            <div class="artifact-code">${a.code}</div>
            <div class="artifact-title">${a.title}</div>
          </div>
        </div>
        <div class="artifact-desc">${a.description||''}</div>
        <div class="artifact-footer">
          <span class="artifact-cat ${catClass(a.category)}">${a.category}</span>
          <span class="text-muted text-xs font-mono">.${a.file_type.toUpperCase()}</span>
        </div>
      </div>`).join('')}
    </div>`}
  `;
}

function openArtifact(a) {
  document.getElementById('modalCode').textContent = a.code;
  document.getElementById('modalArtTitle').textContent = a.title;
  document.getElementById('modalArtDesc').textContent = a.description || '';
  document.getElementById('modalDownloadBtn').href = a.file_url;
  document.getElementById('artifactModal').classList.add('open');
}
function closeArtModal() { document.getElementById('artifactModal').classList.remove('open'); }
function setFilter(f) { activeFilter = f; renderArtifacts(); }
function searchArtifacts(q) { searchQuery = q.toLowerCase(); renderArtifacts(); }

init();
</script>
</body>
</html>
